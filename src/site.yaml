- Media:
    tags: book
    title: The Woman in the Dunes
    author: Kōbō Abe
    thumbsup: true
    review: 🤔
    daterange: 25 - 26 Feb 2026
    slug: dunes
    richcontent: >
        enjoyed it. for some reason even though I find Kobo Abe's writing kinda offputting at times (intentionally) 
        i find it very quick to read. he seems to like to be very visceral. in this book less so than in The Ark Sakura 
        but all the same. always wonder whether the dialogue is so halting because of the translation or the actual writing itself.
        also the main characters in this and the ark sakura are very similar. both sorta odd and interested in bugs... makes you wonder.
        the whole metaphysical aspect interesting but not mind blowing or particularly emotive. more raises things to be considered than 
        immerses you in their consideration.
        
